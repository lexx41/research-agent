<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
  #app { display: flex; flex-direction: column; height: 620px; width: 100%; max-width: 700px; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  #header { padding: 12px 16px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 10px; background: #f9f9f9; }
  #header-icon { width: 32px; height: 32px; border-radius: 8px; background: #1D9E75; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  #header h2 { font-size: 14px; font-weight: 600; color: #111; }
  #header p { font-size: 12px; color: #888; }
  #mode-switch { margin-left: auto; display: flex; gap: 4px; background: #efefef; border-radius: 8px; padding: 3px; }
  .mode-btn { font-size: 11px; padding: 4px 10px; border: none; border-radius: 6px; cursor: pointer; color: #666; background: transparent; font-weight: 400; transition: all 0.15s; }
  .mode-btn.active { background: white; color: #111; border: 1px solid #ddd; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .avatar.agent { background: #E1F5EE; color: #0F6E56; }
  .avatar.user { background: #e8f0fe; color: #1a56db; }
  .bubble { max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; border: 1px solid #e8e8e8; background: white; color: #111; white-space: pre-wrap; word-break: break-word; }
  .bubble.user { background: #f3f4f6; }
  .step-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; font-weight: 500; }
  .step-plan { background: #E1F5EE; color: #0F6E56; }
  .step-search { background: #E6F1FB; color: #185FA5; }
  .step-answer { background: #EAF3DE; color: #3B6D11; }
  .step-chat { background: #FAEEDA; color: #854F0B; }
  .thinking { display: flex; gap: 4px; align-items: center; padding: 10px 14px; background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 12px; font-size: 12px; color: #888; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #1D9E75; animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  #quick-chips { padding: 0 16px 10px; display: flex; gap: 6px; flex-wrap: wrap; background: #f9f9f9; }
  .chip { font-size: 11px; padding: 4px 10px; border: 1px solid #e0e0e0; border-radius: 20px; cursor: pointer; color: #555; background: white; transition: all 0.15s; white-space: nowrap; }
  .chip:hover { border-color: #1D9E75; color: #0F6E56; }
  #input-area { padding: 12px 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 8px; align-items: flex-end; background: #f9f9f9; }
  #user-input { flex: 1; resize: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: system-ui, sans-serif; line-height: 1.5; min-height: 36px; max-height: 100px; background: white; color: #111; }
  #user-input:focus { outline: none; border-color: #1D9E75; }
  #send-btn { width: 36px; height: 36px; border-radius: 8px; border: none; background: #1D9E75; color: white; cursor: pointer; font-size: 16px; transition: opacity 0.15s; }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-icon">🤖</div>
    <div>
      <h2>Research Agent</h2>
      <p>Исследует темы и отвечает на вопросы</p>
    </div>
    <div id="mode-switch">
      <button class="mode-btn active" id="btn-research" onclick="setMode('research')">Исследование</button>
      <button class="mode-btn" id="btn-chat" onclick="setMode('chat')">Чат</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="quick-chips">
    <span class="chip" onclick="useChip(this)">актуальные кодинг-агенты 2025</span>
    <span class="chip" onclick="useChip(this)">мультиагентные системы тренды</span>
    <span class="chip" onclick="useChip(this)">MCP протокол что это</span>
    <span class="chip" onclick="useChip(this)">RAG vs Fine-tuning</span>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Введите тему для исследования..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// =============================================
// ФРОНТЕНД — выполняется в браузере
// Ключ Groq здесь НЕ хранится.
// Все запросы идут на /api/chat — наш бэкенд.
// =============================================

let mode = 'research';
let history = [];
let busy = false;

// Системный промпт для режима Исследование
// Реализует паттерн Plan-and-Execute:
// план → поисковые запросы → итоговый отчёт
const SYSTEM_RESEARCH = `Ты — AI-агент-исследователь. Когда получаешь тему для исследования, ты ОБЯЗАН действовать строго по следующему алгоритму:

1. ПЛАН: Напиши раздел "📋 ПЛАН ИССЛЕДОВАНИЯ:" — перечисли 3-4 конкретных аспекта, которые исследуешь.

2. ПОИСК 1: Напиши "🔍 ПОИСКОВЫЙ ЗАПРОС 1: [запрос]" и "📄 РЕЗУЛЬТАТ 1:" — дай конкретные актуальные данные по первому аспекту.

3. ПОИСК 2: Напиши "🔍 ПОИСКОВЫЙ ЗАПРОС 2: [запрос]" и "📄 РЕЗУЛЬТАТ 2:" — дай данные по второму аспекту.

4. ПОИСК 3: Напиши "🔍 ПОИСКОВЫЙ ЗАПРОС 3: [запрос]" и "📄 РЕЗУЛЬТАТ 3:" — дай данные по третьему аспекту.

5. ОТЧЁТ: Напиши "📊 ИТОГОВЫЙ ОТЧЁТ:" и дай структурированный вывод с ключевыми находками, сравнениями и рекомендациями.

Отвечай на русском языке. Будь конкретным. Все 5 блоков обязательны.`;

// Системный промпт для режима Чат
// Guardrails — список запрещённых тем
const SYSTEM_CHAT = `Ты — дружелюбный AI-ассистент. Свободно общаешься на любые темы, КРОМЕ:
- Создание вредоносного контента или оружия
- Незаконная деятельность
- Медицинские диагнозы и юридические советы
- Генерация дезинформации

По всем остальным темам — технологии, наука, образование, AI, программирование — отвечай развёрнуто. Отвечай на русском языке.`;

function setMode(m) {
  mode = m;
  document.getElementById('btn-research').classList.toggle('active', m === 'research');
  document.getElementById('btn-chat').classList.toggle('active', m === 'chat');
  document.getElementById('user-input').placeholder = m === 'research'
    ? 'Введите тему для исследования...'
    : 'Задайте любой вопрос...';
  document.getElementById('quick-chips').style.display = m === 'research' ? 'flex' : 'none';
}

function useChip(el) {
  document.getElementById('user-input').value = el.textContent;
  sendMessage();
}

function addMsg(role, content, stepType) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'user' : 'agent');
  av.textContent = role === 'user' ? 'Вы' : 'AI';
  const bub = document.createElement('div');
  bub.className = 'bubble ' + (role === 'user' ? 'user' : '');
  if (stepType) {
    const badge = document.createElement('div');
    badge.className = 'step-badge step-' + stepType;
    const labels = { plan:'Агент: план', search:'Агент: поиск', answer:'Агент: отчёт', chat:'Агент: ответ' };
    badge.textContent = labels[stepType] || '';
    bub.appendChild(badge);
    bub.appendChild(document.createElement('br'));
  }
  const txt = document.createElement('span');
  txt.textContent = content;
  bub.appendChild(txt);
  div.appendChild(av);
  div.appendChild(bub);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'thinking-indicator';
  div.innerHTML = `<div class="avatar agent">AI</div><div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:6px;font-size:12px;">Агент думает...</span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
}

function parseAndDisplay(text) {
  const blocks = [];
  const planMatch = text.match(/📋 ПЛАН ИССЛЕДОВАНИЯ:([\s\S]*?)(?=🔍 ПОИСКОВЫЙ ЗАПРОС 1:|$)/);
  if (planMatch) blocks.push({ type: 'plan', content: planMatch[1].trim() });
  const searches = [...text.matchAll(/🔍 ПОИСКОВЫЙ ЗАПРОС (\d):([\s\S]*?)(?=📄 РЕЗУЛЬТАТ \d:|$)/g)];
  const results = [...text.matchAll(/📄 РЕЗУЛЬТАТ (\d):([\s\S]*?)(?=🔍 ПОИСКОВЫЙ ЗАПРОС \d:|📊 ИТОГОВЫЙ ОТЧЁТ:|$)/g)];
  searches.forEach((s, i) => {
    blocks.push({ type: 'search', content: `Запрос ${s[1]}: ${s[2].trim()}\n\n${results[i] ? 'Результат: ' + results[i][2].trim() : ''}` });
  });
  const reportMatch = text.match(/📊 ИТОГОВЫЙ ОТЧЁТ:([\s\S]*?)$/);
  if (reportMatch) blocks.push({ type: 'answer', content: reportMatch[1].trim() });
  if (blocks.length === 0) blocks.push({ type: 'chat', content: text });
  blocks.forEach((b, i) => setTimeout(() => addMsg('agent', b.content, b.type), i * 100));
}

async function sendMessage() {
  if (busy) return;
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  busy = true;
  document.getElementById('send-btn').disabled = true;
  addMsg('user', text, null);
  history.push({ role: 'user', content: text });
  showThinking();

 try {
  showThinking();

  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: history, systemPrompt: currentSystemPrompt })
  });

  // 🔒 Безопасный парсинг: защита от HTML-ошибок Vercel или CORS
  let data;
  try {
    data = await res.json();
  } catch {
    data = { error: `Сервер вернул статус ${res.status} (не JSON)` };
  }

  hideThinking();

  // ❌ Обработка ошибок бэкенда
  if (!res.ok) {
    const errorMsg = data?.error || `Ошибка сервера (${res.status})`;
    addMessage('assistant', `⚠️ ${errorMsg}`);
    return; // Прерываем, чтобы не парсить пустой ответ
  }

  // ✅ Успешный ответ
  const aiText = data.choices?.[0]?.message?.content || 'Модель вернула пустой ответ';
  addMessage('assistant', aiText);
  history.push({ role: 'assistant', content: aiText });

} catch (err) {
  hideThinking();
  console.error('Network error:', err);
  addMessage('assistant', `🌐 Ошибка соединения: ${err.message || 'Проверьте интернет'}`);
}

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('user-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

addMsg('agent', 'Привет! Я Research Agent.\n\nВ режиме «Исследование» введи любую тему — я составлю план, сделаю несколько поисковых запросов и выдам структурированный отчёт.\n\nВ режиме «Чат» просто спрашивай о технологиях, AI, программировании и других темах.\n\nПопробуй быстрые кнопки или напиши свой запрос!', 'chat');
</script>
</body>
</html>
