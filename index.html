<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Research Agent</title>
  <style>
    :root { --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; --primary: #3b82f6; --accent: #10b981; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
    .container { max-width: 800px; width: 100%; display: flex; flex-direction: column; gap: 16px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface); border-radius: 12px; }
    .mode-switch { display: flex; gap: 8px; }
    .mode-btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; background: transparent; color: var(--text); transition: 0.2s; }
    .mode-btn.active { background: var(--primary); color: white; }
    #chat { flex: 1; overflow-y: auto; padding: 16px; background: var(--surface); border-radius: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 400px; max-height: 600px; }
    .message { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; white-space: pre-wrap; }
    .user { align-self: flex-end; background: var(--primary); color: white; }
    .assistant { align-self: flex-start; background: #334155; }
    .input-area { display: flex; gap: 8px; padding: 12px; background: var(--surface); border-radius: 12px; }
    #message-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: var(--text); outline: none; }
    #send-btn { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0; }
    .chip { padding: 6px 12px; background: #334155; border: 1px solid #475569; border-radius: 20px; cursor: pointer; font-size: 14px; }
    .chip:hover { background: #475569; }
    .thinking { color: #94a3b8; font-style: italic; padding: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h2>🤖 AI-Агент-Исследователь</h2>
      <div class="mode-switch">
        <button class="mode-btn active" onclick="setMode('research')">🔍 Исследование</button>
        <button class="mode-btn" onclick="setMode('chat')">💬 Чат</button>
      </div>
    </header>

    <div id="chat"></div>

    <div class="chips">
      <div class="chip" onclick="useChip('актуальные кодинг-агенты 2025')">актуальные кодинг-агенты 2025</div>
      <div class="chip" onclick="useChip('тренды в AI')">тренды в AI</div>
      <div class="chip" onclick="useChip('как работает Vercel')">как работает Vercel</div>
    </div>

    <div class="input-area">
      <input type="text" id="message-input" placeholder="Введите запрос..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button id="send-btn" onclick="sendMessage()">Отправить</button>
    </div>
  </div>

  <script>
    const SYSTEM_RESEARCH = `Ты — AI-агент-исследователь. Когда получаешь тему для исследования, ты ОБЯЗАН действовать строго по следующему алгоритму:
1. 📋 ПЛАН ИССЛЕДОВАНИЯ: Перечисли 3-4 конкретных аспекта темы.
2. 🔍 ПОИСК 1: Напиши "🔍 ПОИСКОВЫЙ ЗАПРОС 1: [запрос]" и ниже "📄 РЕЗУЛЬТАТ 1:" с актуальными данными.
3. 🔍 ПОИСК 2: Аналогично для второго аспекта.
4. 🔍 ПОИСК 3: Аналогично для третьего аспекта.
5. 📊 ИТОГОВЫЙ ОТЧЁТ: Синтезируй все данные в структурированный вывод.
Не добавляй лишних рассуждений. Строго следуй формату.`;

    const SYSTEM_CHAT = `Ты — полезный ассистент. Ты можешь общаться на любые темы, КРОМЕ: оружие, незаконная деятельность, медицинские диагнозы, дезинформация, взлом систем. Если пользователь затрагивает эти темы, вежливо откажись отвечать.`;

    let currentMode = 'research';
    let history = [];

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (mode === 'research' && i === 0) || (mode === 'chat' && i === 1));
      });
      history = [];
      document.getElementById('chat').innerHTML = `<div class="message assistant">Режим: ${mode === 'research' ? '🔍 Исследование' : '💬 Чат'}. Ожидание запроса...</div>`;
    }

    function useChip(text) {
      document.getElementById('message-input').value = text;
      sendMessage();
    }

    function addMessage(role, text) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showThinking() {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'thinking';
      div.id = 'thinking-indicator';
      div.textContent = '⏳ Агент думает и собирает данные...';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      document.getElementById('send-btn').disabled = true;
    }

    function hideThinking() {
      const el = document.getElementById('thinking-indicator');
      if (el) el.remove();
      document.getElementById('send-btn').disabled = false;
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addMessage('user', text);
      history.push({ role: 'user', content: text });
      showThinking();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history, systemPrompt: currentMode === 'research' ? SYSTEM_RESEARCH : SYSTEM_CHAT })
        });

        const data = await res.json();
        hideThinking();

        // 🔴 Обработка ошибок от бэкенда
        if (!res.ok) {
          const errorMsg = data.error || `Ошибка сервера (${res.status})`;
          addMessage('assistant', `⚠️ ${errorMsg}`);
          return;
        }

        // ✅ Успешный ответ
        const aiText = data.choices?.[0]?.message?.content || 'Получен пустой ответ';
        addMessage('assistant', aiText);
        history.push({ role: 'assistant', content: aiText });

      } catch (err) {
        hideThinking();
        addMessage('assistant', '🌐 Нет соединения с сервером. Проверь интернет или статус Vercel.');
      }
    }
  </script>
</body>
</html>
